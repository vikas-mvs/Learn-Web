<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form </title>
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: grid;
            place-items: center;
        }
        .container {
            width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 3px solid #00a4f7;
            border-radius: 10px;
            justify-content: center;
            box-shadow: 5px 5px 20px 2px rgba(0, 154, 196, 0.576);

        }
        form {
            display: flex;
            flex-direction: column;
            gap: 2px;
            
        }
        input, select, textarea {
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        img {
            display: block;
            margin: 0 auto 20px;
            border-radius: 50%;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(7, 129, 236);
            box-shadow: 2px 2px 5px gray;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(0, 69, 129);
        }
        #submit {
            background-color: #00a4f7;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-weight: bold;
            font-size: 20px
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="logo" width="100" height="100">
        <h1>AXL CodeX</h1>
        <h2>Registration Form</h2>
        <form action="submit.php" method="post">
            <label for="name">Name :</label>
            <input type="text" id="name" name="name" placeholder="Enter Full Name" required>
            <fieldset>
                <legend>Gender</legend>
                <input type="radio" name="gender" id="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="female">
                <label for="female">Female</label>
            </fieldset>

            <label for="phone">Phone :</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 77-7766-6444"  required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="abcd@gmail.com" required>

            <label for="college">College :</label>
            <select name="college" id="college" required>
                <option value="">Select a college</option>
                <option value="SRGC">Shri Radha Krishna Geonka College</option>
                <option value="RssScC">Ram Sakal Singh Science College </option>
                <option value="RssMC">Ram Sewak Singh Mahila College</option>
                <option value="LsCM">Langat Singh College Muzaffarpur</option>
                <option value="LNMCOBM">Lalit Narayan Mishra College of Business Management</option>
                <option value="BRABU">Bhim Rao Ambedkar Bihar University</option>
            </select>
            <fieldset required>
                <legend>Choose your courses</legend>
                <input type="radio" name="courses[]" id="course1" value="course1">
                <label for="course1">BCA</label>
                <input type="radio" name="courses[]" id="course2" value="course2">
                <label for="course2">BBA</label>
            </fieldset>
            <label for="semester">Semester :</label>
            <select name="semester" id="semester" required>
                <legend>Choose your Semester</legend>
                <option value="">Select your semester</option>
                <option value="sem1">Semester 1</option>
                <option value="sem2">Semester 2</option>
                <option value="sem3">Semester 3</option>
                <option value="sem4">Semester 4</option>
                <option value="sem5">Semester 5</option>
                <option value="sem6">Semester 6</option>
            </select>
            <label for="feedback">Feedback :</label>
            <textarea name="feedback" id="feedback" placeholder="Enter your feedback" cols="30" rows="5"></textarea>
            <input type="submit" value="Register" id="submit">
        </form>
</body>
</html>
