<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form </title>
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: grid;
            place-items: center;
        }
        .container {
            width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 3px solid #00a4f7;
            border-radius: 10px;
            justify-content: center;
            box-shadow: 5px 5px 20px 2px rgba(0, 154, 196, 0.576);

        }
        form {
            display: flex;
            flex-direction: column;
            gap: 2px;
            
        }
        input, select, textarea {
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        img {
            display: block;
            margin: 0 auto 20px;
            border-radius: 50%;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(7, 129, 236);
            box-shadow: 2px 2px 5px gray;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(0, 69, 129);
        }
        #submit {
            background-color: #00a4f7;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-weight: bold;
            font-size: 20px
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="logo" width="100" height="100">
        <h1>AXL CodeX</h1>
        <h2>Registration Form</h2>
        <form id="form">
            <label for="name">Name :</label>
            <input type="text" id="name" name="name" placeholder="Enter Full Name" required>
            <fieldset>
                <legend>Gender</legend>
                <input type="radio" name="gender" id="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="female">
                <label for="female">Female</label>
            </fieldset>

            <label for="phone">Phone :</label>
            <input type="tel" id="phone" name="phone" placeholder=" 77766-6444"  required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="abcd@gmail.com" required>

            <label for="college">College :</label>
            <select name="college" id="college" required>
                <option value="">Select a college</option>
                <option value="SRGC">Shri Radha Krishna Geonka College</option>
                <option value="Rss.Sc.C">Ram Sakal Singh Science College </option>
                <option value="Rss.M.C">Ram Sewak Singh Mahila College</option>
                <option value="Ls.C.M">Langat Singh College Muzaffarpur</option>
                <option value="LNMCOBM">Lalit Narayan Mishra College of Business Management</option>
                <option value="BRABU">Bhim Rao Ambedkar Bihar University</option>
            </select>
            <fieldset required>
                <legend>Choose your courses</legend>
                <input type="radio" name="course" id="BCA" value="BCA">
                <label for="course1">BCA</label>
                <input type="radio" name="course" id="BBA" value="BBA">
                <label for="course2">BBA</label>
            </fieldset>
            <label for="semester">Semester :</label>
            <select name="semester" id="semester" required>
                <legend>Choose your Semester</legend>
                <option value="">Select your semester</option>
                <option value="1 sem">1st Semester</option>
                <option value="2 sem">2nd Semester</option>
                <option value="3 sem">3rd Semester</option>
                <option value="4 sem">4th Semester</option>
                <option value="5 sem">5th Semester</option>
                <option value="6 sem">6th Semester</option>
            </select>
            <label for="feedback">Feedback :</label>
            <textarea name="feedback" id="feedback" placeholder="Enter your feedback" cols="30" rows="5"></textarea>
            <input type="submit" value="Submit" id="submit">
        </form>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwc2OZSZFkkTepI0Jr5jbfSujlA3uc2gl6kkIkgsfnoG1a1Z4Tjx5zi9R-9Ne81J0e5jw/exec";

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        gender: document.querySelector('input[name="gender"]:checked')?.value || "",
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        college: document.getElementById("college").value,
        course: document.querySelector('input[name="course"]:checked')?.value || "",
        semester: document.getElementById("semester").value,
        feedback: document.getElementById("feedback").value
    };

    fetch(scriptURL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("✅ Form Submitted Successfully!");
        document.getElementById("form").reset();
    })
    .catch(() => {
        alert("❌ Submission Failed");
    });
});
</script>
</body>
</html>
