<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXL CodeX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .box {
    background: rgba(255, 255, 255, 0.05);
    padding: 50px 60px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    text-align: center;
    transform: translateY(0);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    z-index: 10;
  }
  .box:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }
  h1 {
    font-size: 3.5em;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  p.subtitle {
    font-size: 1.1em;
    color: #b3b3b3;
    margin-bottom: 40px;
    font-weight: 300;
  }
  .btn-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  a {
    display: block;
    padding: 15px 30px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    text-decoration: none;
    font-size: 1.1em;
    font-weight: 600;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
  }
  a:hover::before {
    left: 100%;
  }
  a:hover {
    background: #0072ff;
    border-color: #0072ff;
    box-shadow: 0 0 20px rgba(0, 114, 255, 0.6);
    transform: scale(1.05);
  }
  .blobs {
    position: absolute;
    filter: blur(80px);
    z-index: 0;
    opacity: 0.5;
    border-radius: 50%;
    animation: float 10s ease-in-out infinite;
  }
  .blob1 {
    top: 10%;
    left: 15%;
    width: 300px;
    height: 300px;
    background: #0072ff;
  }
  .blob2 {
    bottom: 10%;
    right: 15%;
    width: 350px;
    height: 350px;
    background: #8a2be2;
    animation-delay: -5s;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.1); }
  }
</style>
</head>
<body>

<div class="blobs blob1"></div>
<div class="blobs blob2"></div>

<div class="box">
  <h1>AXL CodeX</h1>
  <p class="subtitle">Welcome to the future of learning</p>
  <div class="btn-container">
    <a href="login.html">Login to Account</a>
    <a href="register.html">Register New Course</a>
  </div>
</div>

</body>
</html>
