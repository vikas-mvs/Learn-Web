<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Course - AXL CodeX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .container {
    width: 400px;
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    z-index: 10;
  }
  h2 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 1.8em;
    font-weight: 600;
  }
  .input-group {
    margin-bottom: 15px;
  }
  input, select {
    width: 100%;
    padding: 12px 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    color: #fff;
    font-size: 1em;
    outline: none;
    transition: all 0.3s ease;
  }
  select option {
    background: #302b63;
    color: #fff;
  }
  input::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }
  input:focus, select:focus {
    border-color: #8a2be2;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
  }
  #submit {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: linear-gradient(90deg, #8a2be2, #00c6ff);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  #submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
  }
  /* Loader */
  #loader {
    display: none;
    margin-top: 15px;
  }
  .spinner {
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid #00c6ff;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    animation: spin 1s linear infinite;
    margin: auto;
  }
  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
  /* Popup */
  .popup {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(40, 167, 69, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    display: none;
    font-weight: 600;
    z-index: 100;
    animation: slideUp 0.3s ease forwards;
  }
  @keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .blobs {
    position: absolute;
    filter: blur(80px);
    z-index: 0;
    opacity: 0.5;
    border-radius: 50%;
    animation: float 10s ease-in-out infinite;
  }
  .blob1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #8a2be2; }
  .blob2 { bottom: -10%; right: -10%; width: 350px; height: 350px; background: #00c6ff; animation-delay: -5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.1); }
  }
  .nav-back {
    position: absolute;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.9em;
    z-index: 20;
    transition: color 0.3s;
  }
  .nav-back:hover {
    color: #fff;
  }
</style>
</head>
<body>

<a href="index.html" class="nav-back">← Back to Home</a>

<div class="blobs blob1"></div>
<div class="blobs blob2"></div>

<div class="container">
  <h2>Enroll Now</h2>
  
  <form id="form">
    <div class="input-group">
      <input id="name" placeholder="Full Name" required>
    </div>
    <div class="input-group">
      <input type="email" id="email" placeholder="Email Address" required>
    </div>
    <div class="input-group">
      <input type="tel" id="phone" placeholder="Phone Number" required>
    </div>
      <div class="input-group">
        <label for="course" style="display:block; font-size:0.9em; color:#ccc; margin-bottom:5px;">Select Course</label>
        <select id="course" required>
          <option value="" disabled selected>Choose a course</option>
          <option value="Web Development">Web Development</option>
          <option value="Python Programming">Python Programming</option>
          <option value="Data Science">Data Science</option>
        </select>
      </div>

      <div class="input-group" style="display: flex; gap: 15px;">
        <div style="flex: 1;">
          <label for="gender" style="display:block; font-size:0.9em; color:#ccc; margin-bottom:5px;">Gender</label>
          <select id="gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div style="flex: 1;">
          <label for="semester" style="display:block; font-size:0.9em; color:#ccc; margin-bottom:5px;">Semester</label>
          <select id="semester" required>
            <option value="" disabled selected>Select Semester</option>
            <option value="1st Semester">1st Semester</option>
            <option value="2nd Semester">2nd Semester</option>
            <option value="3rd Semester">3rd Semester</option>
            <option value="4th Semester">4th Semester</option>
            <option value="5th Semester">5th Semester</option>
            <option value="6th Semester">6th Semester</option>
            <option value="7th Semester">7th Semester</option>
            <option value="8th Semester">8th Semester</option>
          </select>
        </div>
      </div>

      <div class="input-group">
      <label for="photo" style="display:block; text-align:left; margin-bottom:5px; font-size:0.9em; color:#ccc;">Upload Profile Photo (Optional)</label>
      <input type="file" id="photo" accept="image/*" style="padding: 10px;">
    </div>
    <button type="submit" id="submit">Submit Application</button>
  </form>

  <div style="margin-top: 20px; text-align: center;">
    <a href="login.html" style="all: unset; color: rgba(255,255,255,0.7); font-size: 0.9em; cursor: pointer; text-decoration: underline; transition: color 0.3s;">Already have an account? Login here</a>
  </div>

  <div id="loader">
    <div class="spinner"></div>
  </div>
</div>

<div id="popup" class="popup">✅ Application Submitted Successfully</div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const form = document.getElementById("form");
const loader = document.getElementById("loader");
const popup = document.getElementById("popup");
let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    if (!user.emailVerified && user.email !== ADMIN_EMAIL) {
      alert("❌ Please verify your email first to access the registration form.");
      window.location.href = "dashboard.html";
      return;
    }
    currentUser = user;
  } else {
    window.location.href = "login.html";
  }
});

// Function to compress image and convert to Base64 string
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = event => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        const MAX_WIDTH = 300;
        let width = img.width;
        let height = img.height;
        
        if (width > MAX_WIDTH) {
          height = Math.round((height * MAX_WIDTH) / width);
          width = MAX_WIDTH;
        }
        
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);
        
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = error => reject(error);
    };
    reader.onerror = error => reject(error);
  });
}

form.addEventListener("submit", async(e) => {
  e.preventDefault();

  loader.style.display = "block";
  document.getElementById("submit").disabled = true;

  try {
    let photoUrl = "";
    const photoFile = document.getElementById('photo').files[0];
    
    // Compress photo to Base64 if selected
    if (photoFile) {
      photoUrl = await compressImage(photoFile);
    }

    const data = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      course: document.getElementById('course').value,
      gender: document.getElementById('gender').value,
      semester: document.getElementById('semester').value,
      photoUrl: photoUrl,
      userId: currentUser ? currentUser.uid : "anonymous",
      timestamp: new Date().toISOString()
    };

    await addDoc(collection(db, "applications"), data);

    loader.style.display = "none";
    document.getElementById("submit").disabled = false;
    popup.style.display = "block";

    setTimeout(() => {
      popup.style.display = "none";
    }, 3000);

    form.reset();
  } catch (error) {
    loader.style.display = "none";
    document.getElementById("submit").disabled = false;
    alert("Error submitting form: " + error.message);
  }
});
</script>
</body>
</html>
