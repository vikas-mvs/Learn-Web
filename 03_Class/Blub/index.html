<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb On/Off Switch</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        img {
            height: 500px;
            width: 500px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        button {
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #f39c12;
            color: white;
            transition: 0.3s;
        }
        button:hover {
            background-color: #e67e22;
            box-shadow: 0px 2px 18px 3px #b4b4b4;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Default Image (Off) -->
        <img id="bulbImage" src="BlubOff.png" alt="Bulb Off">
        <br>
        <button id="switchBtn" onclick="toggleBulb()">Switch ON</button>
    </div>

    <script>
        function toggleBulb() {
            var img = document.getElementById('bulbImage');
            var btn = document.getElementById('switchBtn');

            // Use the element's 'src' attribute (relative filename) so we don't depend on the full URL
            var src = img.getAttribute('src');

            // The files in this folder are named 'BlubOff.png' and 'blubOn.png'
            if (src === 'BlubOff.png' || src === 'bluboff.png') {
                img.setAttribute('src', 'blubOn.png'); // switch to the existing on-image
                img.alt = 'Bulb On';
                btn.innerHTML = 'Switch OFF';
                btn.style.backgroundColor = '#7f8c8d';
            } else {
                img.setAttribute('src', 'BlubOff.png');
                img.alt = 'Bulb Off';
                btn.innerHTML = 'Switch ON';
                btn.style.backgroundColor = '#f39c12';
            }
        }
    </script>

</body>
</html>
